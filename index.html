<!DOCTYPE html>
<html>
<head>
    <title>Rock Paper Scissors</title>
    <style>
        body{
            background-color:rgb(25, 25, 25);
            color:white;
            font-family: arial;
        }
        .title{
            font-size: 30px;
            font-weight: bold;
        }
        .move-icon{
            height:50px;
        }
        .move-btn{
            background-color: transparent;
            border:3px solid white;
            padding: 26px;
            margin-right: 10px;
            border-radius: 52px;
            cursor: pointer;
        }
        .res-btn{
            font-weight: bold;
            font-size: 20px;
            margin-bottom: 20px;
        }
        .reset-score{
            padding: 10px;
        }
    </style>
</head>

<body>

    <p class="title">Rock Paper Scissors</p>

    <button onclick="
        playGame('rock');
    "class="move-btn"><img src="images/rock-emoji.png" class="move-icon">
    </button>

    <button onclick="
        playGame('paper');
    "class="move-btn"><img src="images/paper-emoji.png" class="move-icon">
    </button>

    <button onclick="
        playGame('scissors'); 
    "class="move-btn"><img src="images/scissors-emoji.png" class="move-icon">
    </button>
    <p class="js-res res-btn"></p>
    <p class="js-moves"> 
    </p>
    <p class="js-score score"></p>
    <button onclick="
        score.wins=0;
        score.losses=0;
        score.ties=0;
        localStorage.removeItem('score');
        updatescore();
    "class="reset-score"> Reset Score</button>
    <script>
        let score=JSON.parse(localStorage.getItem('score')) ||{
            wins:0,
            losses:0,
            ties:0
        };
        updatescore();

        
            
        
        function playGame(playerMove){
            const computerMove=pickComputerMove();


            let result='';
            if(playerMove==='rock'){
                if (computerMove === 'rock') {
                    result = 'Tie.';
                } else if (computerMove === 'paper') {
                    result = 'You lose.';
                } else {
                    result = 'You win.';
                }
            }else if(playerMove==='paper'){
                if (computerMove === 'rock') {
                    result = 'You win.';
                } else if (computerMove === 'paper') {
                    result = 'Tie.';
                } else {
                    result = 'You lose.';
                }
            }else if(playerMove==='scissors'){
                if (computerMove === 'rock') {
                    result = 'You lose.';
                } else if (computerMove === 'paper') {
                    result = 'You win.';
                } else {
                    result = 'Tie.';
                }
            }
            if(result==='You win.'){
                score.wins+=1;
            }else if(result==='You lose.'){
                score.losses+=1;
            }else if(result==='Tie.'){
                score.ties+=1
            }
            localStorage.setItem('score',JSON.stringify(score));
            updatescore();
            document.querySelector('.js-res')
             .innerHTML=result;
            document.querySelector('.js-moves')
                    .innerHTML=
                    `You <img src="images/${playerMove}-emoji.png" class="move-icon"> <img src="images/${computerMove}-emoji.png" class="move-icon"> Computer`;

            
            

        }
        function updatescore(){
            document.querySelector('.js-score')
                .innerHTML=`Wins:${score.wins},Losses:${score.losses},Ties:${score.ties}`;

        }
        function pickComputerMove(){
            let rn = Math.random();
            let computerMove = '';
            if (rn >= 0 && rn < 1/3) {
                computerMove = 'rock';
            } else if (rn >= 1/3 && rn < 2/3) {
                computerMove = 'paper';
            } else {
                computerMove = 'scissors';
            }
            return computerMove;
        }
        
    </script>

</body>
</html>
